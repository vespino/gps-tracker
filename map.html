<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Tracker with Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            color: #e2e8f0;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
            padding: 16px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 4px;
        }

        .header p {
            opacity: 0.9;
            font-size: 12px;
        }

        .content {
            display: flex;
            flex-direction: column;
            flex: 1;
            gap: 16px;
            padding: 16px;
            overflow: hidden;
        }

        .map-section {
            flex: 1;
            background: #1e293b;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            min-width: 0;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .control-section {
            width: 100%;
            background: #1e293b;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            gap: 16px;
            align-items: flex-start;
            flex-wrap: wrap;
        }

        .status {
            background: #0f172a;
            padding: 16px;
            border-radius: 8px;
            border-left: 4px solid #ef4444;
            min-width: 150px;
        }

        .status.active {
            border-left-color: #10b981;
        }

        .status-label {
            font-size: 11px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .status-value {
            font-size: 16px;
            font-weight: 600;
            color: #ef4444;
        }

        .status.active .status-value {
            color: #10b981;
        }

        .data-container {
            display: flex;
            gap: 12px;
            flex: 1;
            min-width: 300px;
        }

        .data-item {
            background: #0f172a;
            padding: 12px;
            border-radius: 6px;
            flex: 1;
        }

        .data-label {
            font-size: 10px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 3px;
        }

        .data-value {
            font-size: 13px;
            font-weight: 600;
            color: #3b82f6;
            word-break: break-all;
        }

        .controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 14px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .btn-start {
            background: #10b981;
            color: white;
        }

        .btn-start:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
        }

        .btn-start:disabled {
            background: #6b7280;
            cursor: not-allowed;
            transform: none;
        }

        .btn-stop {
            background: #ef4444;
            color: white;
        }

        .btn-stop:hover {
            background: #dc2626;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
        }

        .btn-stop:disabled {
            background: #6b7280;
            cursor: not-allowed;
            transform: none;
        }

        .btn-export {
            background: #3b82f6;
            color: white;
        }

        .btn-export:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        .btn-export:disabled {
            background: #6b7280;
            cursor: not-allowed;
            transform: none;
        }

        .btn-clear {
            background: #7c3aed;
            color: white;
        }

        .btn-clear:hover {
            background: #6d28d9;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.4);
        }

        .stats {
            display: flex;
            gap: 12px;
        }

        .stat-box {
            background: #0f172a;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            min-width: 80px;
        }

        .stat-number {
            font-size: 16px;
            font-weight: bold;
            color: #3b82f6;
        }

        .stat-label {
            font-size: 10px;
            color: #64748b;
            margin-top: 2px;
        }

        .message {
            padding: 12px;
            border-radius: 6px;
            font-size: 12px;
            width: 100%;
        }

        .message.error {
            background: #7f1d1d;
            color: #fca5a5;
        }

        .message.success {
            background: #064e3b;
            color: #86efac;
        }

        @media (max-width: 1024px) {
            .content {
                flex-direction: column;
            }

            .control-section {
                width: 100%;
                max-height: auto;
            }

            .map-section {
                flex: 1;
                min-height: 400px;
            }
        }

        @media (max-width: 768px) {
            .control-section {
                flex-direction: column;
            }

            .data-container {
                flex-direction: column;
                min-width: auto;
            }

            .data-item {
                flex: none;
            }

            .controls {
                width: 100%;
            }

            .btn {
                flex: 1;
            }

            .stats {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 12px;
            }

            .header h1 {
                font-size: 18px;
            }

            .content {
                padding: 8px;
                gap: 8px;
            }

            .control-section {
                padding: 12px;
                gap: 8px;
            }

            .data-item {
                padding: 8px;
            }

            .btn {
                padding: 8px 10px;
                font-size: 11px;
            }

            .status {
                min-width: 120px;
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📍 GPS Tracker with Real-Time Map</h1>
            <p>Track your location and visualize it on OpenStreetMap</p>
        </div>

        <div class="content">
            <div class="map-section">
                <div id="map"></div>
            </div>

            <div class="control-section">
                <!-- Status -->
                <div class="status" id="status">
                    <div class="status-label">Status</div>
                    <div class="status-value">Ready</div>
                </div>

                <!-- Current Data -->
                <div class="data-container">
                    <div class="data-item">
                        <div class="data-label">Latitude</div>
                        <div class="data-value" id="latitude">--</div>
                    </div>
                    <div class="data-item">
                        <div class="data-label">Longitude</div>
                        <div class="data-value" id="longitude">--</div>
                    </div>
                    <div class="data-item">
                        <div class="data-label">Altitude</div>
                        <div class="data-value" id="altitude">--</div>
                    </div>
                    <div class="data-item">
                        <div class="data-label">Speed</div>
                        <div class="data-value" id="speed">--</div>
                    </div>
                </div>

                <!-- Controls -->
                <div class="controls">
                    <button class="btn btn-start" id="startBtn" onclick="startTracking()">▶ Start</button>
                    <button class="btn btn-stop" id="stopBtn" onclick="stopTracking()" disabled>⏹ Stop</button>
                    <button class="btn btn-export" id="exportBtn" onclick="exportData()" disabled>📥 Export GeoJSON</button>
                    <button class="btn btn-clear" id="clearBtn" onclick="clearData()">🗑️ Clear</button>
                </div>

                <!-- Stats -->
                <div class="stats">
                    <div class="stat-box">
                        <div class="stat-number" id="pointCount">0</div>
                        <div class="stat-label">Points</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="duration">00:00:00</div>
                        <div class="stat-label">Duration</div>
                    </div>
                </div>

                <!-- Message -->
                <div id="message" style="flex: 0 0 100%;"></div>
            </div>
        </div>
    </div>

    <script>
        let map;
        let tracking = false;
        let watchId = null;
        let points = [];
        let startTime = null;
        let durationInterval = null;
        let currentMarker = null;
        let polyline = null;
        let allPointsMarkers = [];

        const statusEl = document.getElementById('status');
        const messageEl = document.getElementById('message');

        // Create arrow icon for direction
        function createArrowIcon(heading) {
            const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#10b981" width="32" height="32">
                <path d="M12 2L2 20h8v2h4v-2h8L12 2z"/>
            </svg>`;
            
            return L.divIcon({
                html: `<div style="transform: rotate(${heading || 0}deg); width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;">${svg}</div>`,
                className: 'direction-icon',
                iconSize: [32, 32],
                iconAnchor: [16, 16],
                popupAnchor: [0, -16]
            });
        }

        // Initialize map
        function initMap() {
            map = L.map('map').setView([0, 0], 13);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors',
                maxZoom: 19
            }).addTo(map);

            polyline = L.polyline([], {
                color: '#3b82f6',
                weight: 3,
                opacity: 0.7,
                lineCap: 'round',
                lineJoin: 'round'
            }).addTo(map);
        }

        // Request Wake Lock
        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    await navigator.wakeLock.request('screen');
                    showMessage('Screen will stay on during tracking', 'success');
                } catch (err) {
                    console.log('Wake Lock failed:', err);
                }
            }
        }

        // Show message
        function showMessage(msg, type = 'error') {
            messageEl.innerHTML = `<div class="message ${type}">${msg}</div>`;
            setTimeout(() => {
                messageEl.innerHTML = '';
            }, 5000);
        }

        // Start tracking
        function startTracking() {
            if (!navigator.geolocation) {
                showMessage('Geolocation is not supported by your browser', 'error');
                return;
            }

            requestWakeLock();

            tracking = true;
            points = [];
            allPointsMarkers = [];
            startTime = Date.now();
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            document.getElementById('exportBtn').disabled = true;

            statusEl.classList.add('active');
            statusEl.querySelector('.status-value').textContent = 'Tracking';

            polyline.setLatLngs([]);

            // Clear all point markers
            allPointsMarkers.forEach(marker => map.removeLayer(marker));
            allPointsMarkers = [];

            durationInterval = setInterval(updateDuration, 1000);

            watchId = navigator.geolocation.watchPosition(
                (position) => {
                    const coord = position.coords;
                    const timestamp = new Date().toISOString();

                    const point = {
                        latitude: coord.latitude,
                        longitude: coord.longitude,
                        altitude: coord.altitude,
                        speed: coord.speed,
                        accuracy: coord.accuracy,
                        heading: coord.heading,
                        timestamp: timestamp
                    };

                    points.push(point);
                    updateDisplay(point);
                    updateMap(point);
                    updateStats();
                },
                (error) => {
                    console.error('Geolocation error:', error);
                    showMessage('Geolocation error: ' + error.message, 'error');
                },
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                }
            );
        }

        // Stop tracking
        function stopTracking() {
            tracking = false;
            navigator.geolocation.clearWatch(watchId);

            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            document.getElementById('exportBtn').disabled = points.length === 0;

            statusEl.classList.remove('active');
            statusEl.querySelector('.status-value').textContent = 'Stopped';

            clearInterval(durationInterval);

            showMessage(`Tracking stopped. ${points.length} points logged.`, 'success');
        }

        // Update display
        function updateDisplay(point) {
            document.getElementById('latitude').textContent = point.latitude.toFixed(6);
            document.getElementById('longitude').textContent = point.longitude.toFixed(6);
            document.getElementById('altitude').textContent = point.altitude ? point.altitude.toFixed(2) + ' m' : 'N/A';
            document.getElementById('speed').textContent = point.speed ? (point.speed * 3.6).toFixed(2) + ' km/h' : 'N/A';
        }

        // Update map
        function updateMap(point) {
            const latlng = [point.latitude, point.longitude];

            // Remove old current marker
            if (currentMarker) {
                map.removeLayer(currentMarker);
            }

            // Add new current marker with arrow icon showing direction
            currentMarker = L.marker(latlng, {
                icon: createArrowIcon(point.heading || 0)
            }).addTo(map);

            currentMarker.bindPopup(`
                <b>Current Location</b><br>
                Lat: ${point.latitude.toFixed(6)}<br>
                Lon: ${point.longitude.toFixed(6)}<br>
                Alt: ${point.altitude ? point.altitude.toFixed(2) + 'm' : 'N/A'}<br>
                Speed: ${point.speed ? (point.speed * 3.6).toFixed(2) + ' km/h' : 'N/A'}<br>
                Heading: ${point.heading ? point.heading.toFixed(2) + '°' : 'N/A'}
            `);

            // Add small circle marker for all tracked points
            const pointMarker = L.circleMarker(latlng, {
                radius: 4,
                fillColor: '#60a5fa',
                color: '#3b82f6',
                weight: 1,
                opacity: 1,
                fillOpacity: 0.6
            }).addTo(map);

            pointMarker.bindPopup(`
                <b>Point ${points.length}</b><br>
                Time: ${new Date(point.timestamp).toLocaleTimeString()}<br>
                Speed: ${point.speed ? (point.speed * 3.6).toFixed(2) + ' km/h' : 'N/A'}
            `);

            allPointsMarkers.push(pointMarker);

            // Add point to polyline
            polyline.addLatLng(latlng);

            // Center map on current location
            map.setView(latlng, map.getZoom());
        }

        // Update stats
        function updateStats() {
            document.getElementById('pointCount').textContent = points.length;
        }

        // Update duration
        function updateDuration() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const hours = Math.floor(elapsed / 3600);
            const minutes = Math.floor((elapsed % 3600) / 60);
            const seconds = elapsed % 60;

            document.getElementById('duration').textContent = 
                `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        // Export as GeoJSON
        function exportData() {
            if (points.length === 0) {
                showMessage('No data to export', 'error');
                return;
            }

            const features = points.map((point, index) => ({
                type: 'Feature',
                geometry: {
                    type: 'Point',
                    coordinates: [point.longitude, point.latitude]
                },
                properties: {
                    index: index + 1,
                    altitude: point.altitude,
                    speed: point.speed,
                    accuracy: point.accuracy,
                    heading: point.heading,
                    timestamp: point.timestamp
                }
            }));

            const geojson = {
                type: 'FeatureCollection',
                properties: {
                    name: 'GPS Track',
                    startTime: points[0].timestamp,
                    endTime: points[points.length - 1].timestamp,
                    pointCount: points.length
                },
                features: features
            };

            const dataStr = JSON.stringify(geojson, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `gps-track-${new Date().toISOString().split('T')[0]}.json`;
            link.click();
            URL.revokeObjectURL(url);

            showMessage(`Exported ${points.length} points as GeoJSON`, 'success');
        }

        // Clear data
        function clearData() {
            if (confirm('Clear all logged data?')) {
                points = [];
                polyline.setLatLngs([]);
                if (currentMarker) {
                    map.removeLayer(currentMarker);
                    currentMarker = null;
                }
                allPointsMarkers.forEach(marker => map.removeLayer(marker));
                allPointsMarkers = [];
                document.getElementById('pointCount').textContent = '0';
                document.getElementById('duration').textContent = '00:00:00';
                document.getElementById('latitude').textContent = '--';
                document.getElementById('longitude').textContent = '--';
                document.getElementById('altitude').textContent = '--';
                document.getElementById('speed').textContent = '--';
                document.getElementById('exportBtn').disabled = true;
                showMessage('Data cleared', 'success');
            }
        }

        // Initialize on load
        window.addEventListener('load', initMap);
    </script>
</body>
</html>
